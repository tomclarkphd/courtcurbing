/* Decode a compact dataset into an array of bill objects + metadata arrays */
function decodeDataset(data) {
  const { parties, methods, contents, states, partyDetails, rows } = data;
  const bills = rows.map((r) => ({
    id: r[0],
    date: r[1],
    year: r[2],
    congress: r[3],
    sponsor: r[4],
    party: parties[r[5]],
    state: r[6] >= 0 ? states[r[6]] : "",
    method: methods[r[7]],
    content: contents[r[8]],
    cs1: r[9],
    cs2: r[10],
    cosponsors: r[11],
    partyDetail: r[12] != null ? partyDetails[r[12]] : "Unknown",
    chamber: r[0].startsWith("S") ? "Senate" : "House",
    instrument:
      r[0].startsWith("HJRes") || r[0].startsWith("SJRes") ||
      r[0].startsWith("HRes") || r[0].startsWith("SRes") ||
      r[0].startsWith("HConRes") || r[0].startsWith("SConRes")
        ? "Resolution/Amendment"
        : "Statute",
    methodCategory: r[7] != null ? methods[r[7]].split(" - ")[0] : "Other",
    methodKind: r[7] != null
      ? (methods[r[7]].includes(" - ") ? methods[r[7]].split(" - ")[1] : methods[r[7]])
      : "Other",
  }));
  const yearMin = bills.length ? Math.min(...bills.map((b) => b.year || 9999)) : 0;
  const yearMax = bills.length ? Math.max(...bills.map((b) => b.year || 0)) : 0;
  const congMin = bills.length ? Math.min(...bills.map((b) => b.congress || 999)) : 0;
  const congMax = bills.length ? Math.max(...bills.map((b) => b.congress || 0)) : 0;
  return { bills, parties, methods, contents, states, partyDetails, yearMin, yearMax, congMin, congMax };
}

/* =============================================================================
 * Filter logic
 * ============================================================================= */



const DEFAULT_FILTERS = (ds = DECODED_LEGACY) => ({
  yearRange: [ds.yearMin, ds.yearMax],
  parties: new Set(ds.parties),
  methodCats: new Set(["Amendment", "Statute", "Resolutions", "Misc", "Other"]),
  chambers: new Set(["House", "Senate"]),
  instruments: new Set(["Statute", "Resolution/Amendment"]),
  query: "",
});

function applyFilters(bills, f) {
  const q = f.query.trim().toLowerCase();
  return bills.filter((b) => {
    if (b.year == null) return false;
    if (b.year < f.yearRange[0] || b.year > f.yearRange[1]) return false;
    if (!f.parties.has(b.party)) return false;
    if (!f.methodCats.has(b.methodCategory)) return false;
    if (!f.chambers.has(b.chamber)) return false;
    if (!f.instruments.has(b.instrument)) return false;
    if (q) {
      const hay = `${b.id} ${b.sponsor} ${b.content} ${b.method} ${b.state}`.toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

/* =============================================================================
 * Derivations & charts
 * ============================================================================= */

const byCongress = (bills) => {
  const m = new Map();
  for (const b of bills) {
    if (b.congress == null) continue;
    if (!m.has(b.congress))
      m.set(b.congress, {
        congress: b.congress,
        year: congressYear(b.congress),
        total: 0,
        Democrat: 0, Republican: 0, Other: 0, Unknown: 0,
        Statute: 0, Amendment: 0, Resolutions: 0, Misc: 0,
      });
    const row = m.get(b.congress);
    row.total += 1;
    row[b.party] += 1;
    const cat = b.methodCategory;
    if (row[cat] != null) row[cat] += 1;
  }
  return [...m.values()].sort((a, b) => a.congress - b.congress);
};

const methodBreakdown = (bills) => {
  const m = new Map();
  for (const b of bills) m.set(b.method, (m.get(b.method) || 0) + 1);
  return [...m.entries()]
    .map(([name, value]) => ({ name, value, color: METHOD_COLOR[name] || "#94a3b8" }))
    .sort((a, b) => b.value - a.value);
};

const contentBreakdown = (bills, top = 15) => {
  const m = new Map();
  for (const b of bills) m.set(b.content, (m.get(b.content) || 0) + 1);
  return [...m.entries()]
    .map(([name, value]) => ({ name, value }))
    .sort((a, b) => b.value - a.value)
    .slice(0, top);
};

const nominateAverages = (bills) => {
  // Avg cs1 by Congress with at least 3 bills
  const m = new Map();
  for (const b of bills) {
    if (b.cs1 == null) continue;
    if (!m.has(b.congress)) m.set(b.congress, { congress: b.congress, year: congressYear(b.congress), sum: 0, n: 0, sumR: 0, nR: 0, sumD: 0, nD: 0 });
    const row = m.get(b.congress);
    row.sum += b.cs1; row.n += 1;
    if (b.party === "Republican") { row.sumR += b.cs1; row.nR += 1; }
    if (b.party === "Democrat")   { row.sumD += b.cs1; row.nD += 1; }
  }
  return [...m.values()]
    .filter((r) => r.n >= 2)
    .map((r) => ({
      congress: r.congress,
      year: r.year,
      avg: +(r.sum / r.n).toFixed(3),
      avgR: r.nR ? +(r.sumR / r.nR).toFixed(3) : null,
      avgD: r.nD ? +(r.sumD / r.nD).toFixed(3) : null,
    }))
    .sort((a, b) => a.congress - b.congress);
};

/* =============================================================================
 * CSV export
 * ============================================================================= */

function toCSV(bills) {
  const cols = [
    "bill_id","date","year","congress","sponsor","party","party_detail","state",
    "chamber","instrument","method","content","cs1","cs2","cosponsors",
  ];
  const esc = (v) => {
    if (v == null) return "";
    const s = String(v);
    return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
  };
  const lines = [cols.join(",")];
  for (const b of bills) {
    lines.push([
      b.id, b.date, b.year, b.congress, b.sponsor, b.party, b.partyDetail, b.state,
      b.chamber, b.instrument, b.method, b.content, b.cs1, b.cs2, b.cosponsors,
    ].map(esc).join(","));
  }
  return lines.join("\n");
}

function downloadCSV(bills, mode = "legacy") {
  const blob = new Blob([toCSV(bills)], { type: "text/csv;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `court_curbing_${mode}_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function OverviewView({ bills }) {
  const congStats = useMemo(() => byCongress(bills), [bills]);
  const methodStats = useMemo(() => methodBreakdown(bills), [bills]);

function TemporalView({ bills }) {
  const congStats = useMemo(() => byCongress(bills), [bills]);
  const byDecade = useMemo(() => {
    const m = new Map();
    for (const b of bills) {
      if (b.year == null) continue;
      const dec = Math.floor(b.year / 10) * 10;
      if (!m.has(dec)) m.set(dec, { decade: `${dec}s`, _k: dec, total: 0 });
      m.get(dec).total += 1;
    }
    return [...m.values()].sort((a, b) => a._k - b._k);
  }, [bills]);

  return (
    <div className="space-y-6">
      <Card className="p-5">
        <SectionTitle icon={Calendar} title="Bills per Congress — by party of sponsor" subtitle="Shows how Court-curbing introductions surge and subside over time" />

              <YAxis tick={{ fontSize: 11 }} stroke="#94a3b8" />
              <Tooltip contentStyle={{ fontSize: 12 }} labelFormatter={(y) => {
                const r = congStats.find((x) => x.year === y);
                return r ? `${r.congress}th Congress (${y})` : y;
              }} />
              <Legend wrapperStyle={{ fontSize: 11 }} />

              <Area type="monotone" dataKey="Republican" stackId="1" stroke={PARTY_COLOR.Republican} fill={PARTY_COLOR.Republican} fillOpacity={0.7} />
              <Area type="monotone" dataKey="Other"      stackId="1" stroke={PARTY_COLOR.Other}      fill={PARTY_COLOR.Other}      fillOpacity={0.7} />

function IdeologyView({ bills, ds }) {
  /* ── Animation state ── */
  const congresses = useMemo(() => {
    const set = new Set(bills.filter(b => b.cs1 != null).map(b => b.congress));
    return [...set].sort((a, b) => a - b);
  }, [bills]);

  const [animMode, setAnimMode] = useState("all"); // "all" | "single" | "cumulative"
  const [animIdx, setAnimIdx] = useState(0);
  const [isPlaying, setIsPlaying] = useState(false);
  const [speed, setSpeed] = useState(1200);
  const timerRef = useRef(null);

  const animCongress = congresses[animIdx] || congresses[0];

  useEffect(() => {
    if (!isPlaying) { clearInterval(timerRef.current); return; }
    timerRef.current = setInterval(() => {
      setAnimIdx(prev => {
        if (prev >= congresses.length - 1) { setIsPlaying(false); return prev; }
        return prev + 1;
      });
    }, speed);
    return () => clearInterval(timerRef.current);
  }, [isPlaying, speed, congresses.length]);

  /* ── Scatter data (responsive to animation) ── */
  const visibleBills = useMemo(() => {
    if (animMode === "all") return bills;
    if (animMode === "single") return bills.filter(b => b.congress === animCongress);
    return bills.filter(b => b.congress <= animCongress);
  }, [bills, animMode, animCongress]);

  const scatter = useMemo(() => {
    const byParty = { Democrat: [], Republican: [], Other: [], Unknown: [] };
    for (const b of visibleBills) {
      if (b.cs1 == null || b.cs2 == null) continue;
      (byParty[b.party] || byParty.Unknown).push({
        x: b.cs1, y: b.cs2, id: b.id, sponsor: b.sponsor, year: b.year,
        congress: b.congress, method: b.method, party: b.party, partyDetail: b.partyDetail,
      });
    }
    return byParty;
  }, [visibleBills]);

  const scatterCount = useMemo(() =>
    Object.values(scatter).reduce((s, arr) => s + arr.length, 0),
  [scatter]);

  const avgSeries = useMemo(() => nominateAverages(bills), [bills]);

  const hist = useMemo(() => {
    const bins = [];
    const step = 0.1;
    for (let x = -1; x < 1; x += step) {
      bins.push({
        bin: +(x + step / 2).toFixed(2),
        label: `${x.toFixed(1)}`,
        Democrat: 0, Republican: 0, Other: 0, Unknown: 0,
      });
    }
    for (const b of bills) {
      if (b.cs1 == null) continue;
      const i = Math.min(bins.length - 1, Math.max(0, Math.floor((b.cs1 + 1) / step)));
      bins[i][b.party] = (bins[i][b.party] || 0) + 1;
    }
    return bins;
  }, [bills]);

  const startAnim = (mode) => {
    setAnimMode(mode);
    setAnimIdx(0);
    setIsPlaying(true);
  };

  return (
    <div className="space-y-6">
      <Card className="p-5">
        <SectionTitle icon={Users} title="DW-NOMINATE scatter of sponsors"
          subtitle="Each point is a bill introduction, placed at its sponsor's 1st (economic) and 2nd (social) dimension coordinates" />

        {/* Animation controls */}
        <div className="mb-3 flex flex-wrap items-center gap-3">
          <div className="flex items-center gap-1 bg-slate-100 rounded-full p-0.5">
            <button
              onClick={() => { setAnimMode("all"); setIsPlaying(false); }}
              className={`text-xs px-3 py-1 rounded-full font-medium transition-colors ${
                animMode === "all" ? "bg-white text-slate-900 shadow-sm" : "text-slate-500 hover:text-slate-700"
              }`}
            >
              All
            </button>
            <button
              onClick={() => startAnim("single")}
              className={`text-xs px-3 py-1 rounded-full font-medium transition-colors ${
                animMode === "single" ? "bg-white text-slate-900 shadow-sm" : "text-slate-500 hover:text-slate-700"
              }`}
            >
              By Congress
            </button>
            <button
              onClick={() => startAnim("cumulative")}
              className={`text-xs px-3 py-1 rounded-full font-medium transition-colors ${
                animMode === "cumulative" ? "bg-white text-slate-900 shadow-sm" : "text-slate-500 hover:text-slate-700"
              }`}
            >
              Cumulative
            </button>
          </div>

          {animMode !== "all" && (
            <>
              <button
                onClick={() => setIsPlaying(!isPlaying)}
                className="flex items-center gap-1 text-xs px-2.5 py-1.5 rounded-md bg-indigo-600 text-white hover:bg-indigo-700 transition-colors"
              >
                {isPlaying ? <Pause size={12} /> : <Play size={12} />}
                {isPlaying ? "Pause" : "Play"}
              </button>
              <button
                onClick={() => { setAnimIdx(congresses.length - 1); setIsPlaying(false); }}
                className="flex items-center gap-1 text-xs px-2.5 py-1.5 rounded-md bg-slate-200 text-slate-700 hover:bg-slate-300 transition-colors"
                title="Skip to end"
              >
                <SkipForward size={12} />
              </button>
              <select
                value={speed}
                onChange={(e) => setSpeed(Number(e.target.value))}
                className="text-xs px-2 py-1 rounded-md border border-slate-200 bg-white text-slate-700"
              >
                <option value={2000}>Slow</option>
                <option value={1200}>Normal</option>
                <option value={600}>Fast</option>
                <option value={300}>Very fast</option>
              </select>
              <input
                type="range"
                min={0}
                max={congresses.length - 1}
                value={animIdx}
                onChange={(e) => { setAnimIdx(Number(e.target.value)); setIsPlaying(false); }}
                className="flex-1 min-w-[120px] accent-indigo-600"
              />
              <span className="text-sm font-semibold text-slate-900 tabular-nums min-w-[160px]">
                {animCongress}th Congress ({congressYear(animCongress)}–{congressYear(animCongress) + 1})
              </span>
              <span className="text-xs text-slate-500">
                {scatterCount} bill{scatterCount !== 1 ? "s" : ""}
              </span>
            </>
          )}
        </div>

        <div className="h-[420px]">
          <ResponsiveContainer>
            <ScatterChart margin={{ top: 10, right: 20, bottom: 10, left: -5 }}>
              <CartesianGrid strokeDasharray="3 3" stroke="#e2e8f0" />
              <XAxis type="number" dataKey="x" domain={[-1, 1]} tick={{ fontSize: 11 }}
                     label={{ value: "Dim 1  (← liberal | conservative →)", position: "insideBottom", offset: -2, fontSize: 11, fill: "#64748b" }} />
              <YAxis type="number" dataKey="y" domain={[-1, 1]} tick={{ fontSize: 11 }}
                     label={{ value: "Dim 2 (social)", angle: -90, position: "insideLeft", fontSize: 11, fill: "#64748b" }} />
              <ZAxis range={[30, 30]} />
              <ReferenceLine x={0} stroke="#cbd5e1" />
              <ReferenceLine y={0} stroke="#cbd5e1" />
              <Tooltip
                cursor={{ strokeDasharray: "3 3" }}
                contentStyle={{ fontSize: 12 }}
                formatter={(v, n) => [typeof v === "number" ? v.toFixed(2) : v, n]}
                content={({ active, payload }) => {
                  if (!active || !payload?.length) return null;
                  const d = payload[0].payload;
                  return (
                    <div className="bg-white border border-slate-200 rounded-md shadow-sm p-2 text-xs">
                      <div className="font-semibold">{d.id}</div>
                      <div>{d.sponsor} · {d.year}</div>
                      <div className="text-slate-500">{d.method}</div>
                      {d.partyDetail && d.partyDetail !== d.party && (
                        <div className="text-xs text-slate-500">Party: {d.partyDetail}</div>
                      )}
                      <div className="mt-1 tabular-nums">cs1: {d.x?.toFixed(2)} · cs2: {d.y?.toFixed(2)}</div>
                    </div>
                  );
                }}
              />
              <Legend wrapperStyle={{ fontSize: 11 }} />
              {ds.parties.map((p) => (
                <Scatter key={p} name={p} data={scatter[p] || []} fill={PARTY_COLOR[p]} fillOpacity={0.65} />
              ))}
            </ScatterChart>
          </ResponsiveContainer>
        </div>
      </Card>

      <div className="grid md:grid-cols-2 gap-6">
        <Card className="p-5">
          <SectionTitle icon={TrendingUp} title="Average sponsor ideology over time"
            subtitle="Mean 1st-dimension NOMINATE score of sponsors per Congress" />
          <div className="h-64">
            <ResponsiveContainer>
              <LineChart data={avgSeries} margin={{ top: 5, right: 10, left: -10, bottom: 5 }}>
                <CartesianGrid strokeDasharray="3 3" stroke="#e2e8f0" />
                <XAxis dataKey="year" tick={{ fontSize: 10, angle: -45, textAnchor: 'end' }} interval={0} height={50} stroke="#94a3b8" />
                <YAxis domain={[-1, 1]} tick={{ fontSize: 11 }} stroke="#94a3b8" />
                <ReferenceLine y={0} stroke="#cbd5e1" />
                <Tooltip contentStyle={{ fontSize: 12 }} labelFormatter={(y)=>{const r=avgSeries.find(x=>x.year===y); return r?`${r.congress}th Congress (${y})`:y;}} />
                <Legend wrapperStyle={{ fontSize: 11 }} />
                <Line type="monotone" dataKey="avg"  name="All sponsors" stroke="#0f172a" dot={false} strokeWidth={2} />
                <Line type="monotone" dataKey="avgD" name="Democrats"   stroke={PARTY_COLOR.Democrat}   dot={false} strokeWidth={1.5} />
                <Line type="monotone" dataKey="avgR" name="Republicans" stroke={PARTY_COLOR.Republican} dot={false} strokeWidth={1.5} />
              </LineChart>
            </ResponsiveContainer>
          </div>
        </Card>

        <Card className="p-5">
          <SectionTitle icon={BarChart3} title="Distribution of sponsor ideology" subtitle="1st-dim NOMINATE, stacked by party" />
          <div className="h-64">
            <ResponsiveContainer>
              <BarChart data={hist} margin={{ top: 5, right: 10, left: -20, bottom: 5 }}>
                <CartesianGrid strokeDasharray="3 3" stroke="#e2e8f0" />
                <XAxis dataKey="label" tick={{ fontSize: 10 }} stroke="#94a3b8" />
                <YAxis tick={{ fontSize: 10 }} stroke="#94a3b8" />
                <Tooltip contentStyle={{ fontSize: 12 }} labelFormatter={(l) => `cs1 bin: ${l}`} />
                <Legend wrapperStyle={{ fontSize: 11 }} />
                <Bar dataKey="Democrat"   stackId="a" fill={PARTY_COLOR.Democrat} />
                <Bar dataKey="Republican" stackId="a" fill={PARTY_COLOR.Republican} />
                <Bar dataKey="Other"      stackId="a" fill={PARTY_COLOR.Other} />
                <Bar dataKey="Unknown"    stackId="a" fill={PARTY_COLOR.Unknown} />
              </BarChart>
            </ResponsiveContainer>
          </div>
        </Card>
      </div>
    </div>
  );
}

function TypesView({ bills, ds }) {
  const methodStats = useMemo(() => methodBreakdown(bills), [bills]);
  const contentStats = useMemo(() => contentBreakdown(bills, 20), [bills]);

  // Stacked method by era
  const eraData = useMemo(() => {
    const eras = [
      { name: "1878–1919", min: 1878, max: 1919 },
      { name: "1920–1949", min: 1920, max: 1949 },
      { name: "1950–1969", min: 1950, max: 1969 },
      { name: "1970–1989", min: 1970, max: 1989 },
      { name: "1990–2009", min: 1990, max: 2009 },
    ];
    return eras.map((e) => {
      const row = { era: e.name };
      ds.methods.forEach((m) => (row[m] = 0));
      for (const b of bills)
        if (b.year != null && b.year >= e.min && b.year <= e.max)
          row[b.method] = (row[b.method] || 0) + 1;
      return row;
    });
  }, [bills]);

  return (
    <div className="space-y-6">
      <Card className="p-5">
        <SectionTitle icon={Gavel} title="Method over eras" subtitle="Stacked composition of Court-curbing strategies across historical periods" />

function TableView({ bills, ds, datasetMode }) {
  const [sort, setSort] = useState({ key: "year", dir: "desc" });
  const [limit, setLimit] = useState(100);

  const sorted = useMemo(() => {
    const arr = [...bills];
    arr.sort((a, b) => {
      const av = a[sort.key], bv = b[sort.key];
      if (av == null) return 1;
      if (bv == null) return -1;
      if (av < bv) return sort.dir === "asc" ? -1 : 1;
      if (av > bv) return sort.dir === "asc" ?  1 : -1;
      return 0;
    });
    return arr;
  }, [bills, sort]);

  const cols = [
    { k: "id", label: "Bill" },
    { k: "year", label: "Year" },
    { k: "congress", label: "Cong." },
    { k: "sponsor", label: "Sponsor" },
    { k: "party", label: "Party" },
    { k: "state", label: "State" },
    { k: "chamber", label: "Chamber" },
    { k: "method", label: "Method" },
    { k: "content", label: "Content" },
    { k: "cs1", label: "cs1" },
    { k: "cs2", label: "cs2" },

  const toggleSort = (k) =>

  return (

          >

                </td>
                <td className="px-2 py-1.5 whitespace-nowrap">{b.state}</td>
                <td className="px-2 py-1.5">{b.chamber}</td>
                <td className="px-2 py-1.5 whitespace-nowrap">{b.method}</td>
                <td className="px-2 py-1.5">{b.content}</td>
                <td className="px-2 py-1.5 tabular-nums">{b.cs1 != null ? b.cs1.toFixed(2) : ""}</td>
                <td className="px-2 py-1.5 tabular-nums">{b.cs2 != null ? b.cs2.toFixed(2) : ""}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {sorted.length > limit && (
        <div className="mt-3 text-center">
          <button onClick={() => setLimit((l) => l + 200)} className="text-sm text-indigo-600 hover:text-indigo-800">
            Show more ({(sorted.length - limit).toLocaleString()} remaining)
          </button>
        </div>
      )}
    </Card>
  );
}
